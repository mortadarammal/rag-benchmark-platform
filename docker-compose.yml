services:
  postgres:
    image: postgres:16
    container_name: rag_postgres
    environment:
      POSTGRES_DB: rag_benchmark
      POSTGRES_USER: m
      POSTGRES_PASSWORD: m12345678
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: rag_redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
